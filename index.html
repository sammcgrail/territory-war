<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Territory War</title>
<base href="/territory-war/">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  canvas {
    touch-action: none;
  }
  body {
    background: #f5f0e8;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    color: #333;
    padding: 16px;
  }
  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 2px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 0.85rem;
    color: #999;
    margin-bottom: 16px;
  }
  canvas {
    border: 2px solid #ddd;
    border-radius: 4px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;
    margin-top: 16px;
    max-width: 480px;
    width: 100%;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
  }
  .legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.15);
    flex-shrink: 0;
  }
  .legend-name {
    font-weight: 600;
    color: #555;
  }
  .legend-desc {
    color: #999;
    font-size: 0.75rem;
  }
  .legend-pct {
    font-weight: 700;
    font-size: 0.95rem;
    min-width: 36px;
    text-align: right;
  }
  .controls {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  button {
    background: #e8e3da;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 0.8rem;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  button:hover { background: #ddd8ce; }
  .status {
    font-size: 0.8rem;
    color: #999;
    margin-top: 8px;
    height: 20px;
  }
</style>
</head>
<body>
<h1>Territory War</h1>
<p class="subtitle">4 strategies fight for space</p>
<canvas id="grid"></canvas>
<div class="legend" id="legend"></div>
<div class="controls">
  <button id="btnReset">Reset</button>
  <button id="btnPause">Pause</button>
  <button id="btnSpeed">Speed: 1x</button>
</div>
<div class="status" id="status"></div>
<script>
(function() {
  var GRID_W = 80, GRID_H = 80;
  var maxCanvasSize = Math.min(window.innerWidth - 40, window.innerHeight - 220, 560);
  var CELL_PX = Math.max(3, Math.floor(maxCanvasSize / GRID_W));
  var canvas = document.getElementById('grid');
  var ctx = canvas.getContext('2d');
  canvas.width = GRID_W * CELL_PX;
  canvas.height = GRID_H * CELL_PX;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';

  var grid = new Uint8Array(GRID_W * GRID_H);
  var tick = 0;
  var paused = false;
  var speed = 1;
  var speeds = [1, 2, 5, 10];
  var speedIdx = 0;
  var done = false;

  var factions = [
    { id: 1, name: 'Greedy',  desc: 'claims most open space', color: '#e8a87c', darkColor: '#c4835a', pct: 0 },
    { id: 2, name: 'Spiral',  desc: 'multi-head wall-hugger', color: '#555555', darkColor: '#2a2a2a', pct: 0 },
    { id: 3, name: 'Hunter',  desc: 'hybrid expand + chase',  color: '#85b79d', darkColor: '#5a8a6e', pct: 0 },
    { id: 4, name: 'Random',  desc: 'weighted random walk',   color: '#c3a6d8', darkColor: '#9b7bb8', pct: 0 }
  ];

  var BG_COLOR = '#f5f0e8';
  var BORDER_COLOR = '#333';
  var DIR4 = [[1,0],[0,1],[-1,0],[0,-1]];

  // Spiral: 3 independent heads
  var spiralHeads = [];

  function idx(x, y) { return y * GRID_W + x; }
  function inBounds(x, y) { return x >= 0 && x < GRID_W && y >= 0 && y < GRID_H; }

  function getNeighbors4(x, y) {
    var n = [];
    if (x > 0) n.push([x-1, y]);
    if (x < GRID_W-1) n.push([x+1, y]);
    if (y > 0) n.push([x, y-1]);
    if (y < GRID_H-1) n.push([x, y+1]);
    return n;
  }

  // Get frontier cells (empty cells adjacent to faction territory)
  function getFrontier(fid) {
    var frontier = [];
    var seen = {};
    for (var y = 0; y < GRID_H; y++) {
      for (var x = 0; x < GRID_W; x++) {
        if (grid[idx(x, y)] !== fid) continue;
        var nb = getNeighbors4(x, y);
        for (var n = 0; n < nb.length; n++) {
          var nx = nb[n][0], ny = nb[n][1];
          var key = nx * GRID_H + ny;
          if (grid[idx(nx, ny)] === 0 && !seen[key]) {
            seen[key] = true;
            frontier.push([nx, ny]);
          }
        }
      }
    }
    return frontier;
  }

  function initGrid() {
    grid.fill(0);
    tick = 0;
    done = false;
    var starts = [
      [0, 0],
      [GRID_W-1, 0],
      [GRID_W-1, GRID_H-1],
      [0, GRID_H-1]
    ];
    for (var i = 0; i < 4; i++) {
      var sx = starts[i][0], sy = starts[i][1];
      for (var dy = -1; dy <= 1; dy++) {
        for (var dx = -1; dx <= 1; dx++) {
          var nx = Math.max(0, Math.min(GRID_W-1, sx + dx));
          var ny = Math.max(0, Math.min(GRID_H-1, sy + dy));
          grid[idx(nx, ny)] = i + 1;
        }
      }
    }
    // Init 3 spiral heads near top-right corner
    spiralHeads = [
      { x: GRID_W-2, y: 1, dir: 1 },
      { x: GRID_W-1, y: 1, dir: 2 },
      { x: GRID_W-2, y: 0, dir: 0 }
    ];
    document.getElementById('status').textContent = '';
  }

  // GREEDY: expand toward most open space (scores by empty neighbors)
  function greedyMove(fid) {
    var frontier = getFrontier(fid);
    // Score each by open neighbors count
    var scored = [];
    for (var i = 0; i < frontier.length; i++) {
      var fx = frontier[i][0], fy = frontier[i][1];
      var score = 0;
      var nb = getNeighbors4(fx, fy);
      for (var j = 0; j < nb.length; j++) {
        if (grid[idx(nb[j][0], nb[j][1])] === 0) score++;
      }
      scored.push([fx, fy, score]);
    }
    scored.sort(function(a, b) { return b[2] - a[2]; });
    var count = Math.min(3, scored.length);
    for (var i = 0; i < count; i++) {
      if (grid[idx(scored[i][0], scored[i][1])] === 0) {
        grid[idx(scored[i][0], scored[i][1])] = fid;
      }
    }
  }

  // SPIRAL: 3 independent wall-hugging heads
  function spiralMove(fid) {
    // Get border cells for teleporting stuck heads
    var border = [];
    for (var y = 0; y < GRID_H; y++) {
      for (var x = 0; x < GRID_W; x++) {
        if (grid[idx(x, y)] !== fid) continue;
        var nb = getNeighbors4(x, y);
        for (var n = 0; n < nb.length; n++) {
          if (grid[idx(nb[n][0], nb[n][1])] === 0) {
            border.push([x, y]);
            break;
          }
        }
      }
    }
    if (border.length === 0) return;

    // Each head claims 1 cell per tick (3 heads = 3 cells/tick)
    for (var h = 0; h < spiralHeads.length; h++) {
      var head = spiralHeads[h];
      var hx = head.x, hy = head.y;
      var dir = head.dir;
      var found = false;

      // Try right-hand wall following: try turning right first, then straight, then left, then back
      for (var t = 3; t < 7; t++) {
        var testDir = (dir + t) % 4;
        var dx = DIR4[testDir][0], dy = DIR4[testDir][1];
        var nx = hx + dx, ny = hy + dy;
        if (inBounds(nx, ny) && grid[idx(nx, ny)] === 0) {
          grid[idx(nx, ny)] = fid;
          head.x = nx; head.y = ny;
          head.dir = testDir;
          found = true;
          break;
        }
      }

      if (!found && border.length > 0) {
        // Teleport to random border cell
        var rb = border[Math.floor(Math.random() * border.length)];
        var bnb = getNeighbors4(rb[0], rb[1]);
        // Shuffle to avoid bias
        for (var si = bnb.length - 1; si > 0; si--) {
          var sj = Math.floor(Math.random() * (si + 1));
          var stmp = bnb[si]; bnb[si] = bnb[sj]; bnb[sj] = stmp;
        }
        for (var b = 0; b < bnb.length; b++) {
          if (grid[idx(bnb[b][0], bnb[b][1])] === 0) {
            head.x = bnb[b][0]; head.y = bnb[b][1];
            grid[idx(head.x, head.y)] = fid;
            head.dir = Math.floor(Math.random() * 4);
            break;
          }
        }
      }
    }
  }

  // HUNTER: hybrid — expand efficiently but gravitate toward enemy borders
  function hunterMove(fid) {
    var frontier = getFrontier(fid);
    var scored = [];
    for (var i = 0; i < frontier.length; i++) {
      var fx = frontier[i][0], fy = frontier[i][1];
      // Count empty neighbors (expansion value)
      var emptyCount = 0;
      var nb = getNeighbors4(fx, fy);
      for (var j = 0; j < nb.length; j++) {
        if (grid[idx(nb[j][0], nb[j][1])] === 0) emptyCount++;
      }
      // Find distance to nearest enemy (scan larger radius)
      var minDist = 9999;
      var scanR = 20;
      for (var ey = Math.max(0, fy - scanR); ey < Math.min(GRID_H, fy + scanR); ey++) {
        for (var ex = Math.max(0, fx - scanR); ex < Math.min(GRID_W, fx + scanR); ex++) {
          var owner = grid[idx(ex, ey)];
          if (owner > 0 && owner !== fid) {
            var d = Math.abs(ex - fx) + Math.abs(ey - fy);
            if (d < minDist) minDist = d;
          }
        }
      }
      // Hybrid score: expand efficiently but prefer being near enemies
      // Higher = better. emptyCount rewards open space, low dist rewards proximity to enemies
      var distBonus = minDist < 9999 ? Math.max(0, 20 - minDist) : 0;
      var score = emptyCount * 4 + distBonus;
      scored.push([fx, fy, score]);
    }
    scored.sort(function(a, b) { return b[2] - a[2]; });
    var count = Math.min(3, scored.length);
    for (var i = 0; i < count; i++) {
      if (grid[idx(scored[i][0], scored[i][1])] === 0) {
        grid[idx(scored[i][0], scored[i][1])] = fid;
      }
    }
  }

  // RANDOM: weighted random — biased toward cells with more open neighbors
  function randomMove(fid) {
    var frontier = getFrontier(fid);
    if (frontier.length === 0) return;
    // Weight by open neighbors
    var weighted = [];
    for (var i = 0; i < frontier.length; i++) {
      var fx = frontier[i][0], fy = frontier[i][1];
      var w = 1;
      var nb = getNeighbors4(fx, fy);
      for (var j = 0; j < nb.length; j++) {
        if (grid[idx(nb[j][0], nb[j][1])] === 0) w += 2;
      }
      weighted.push([fx, fy, w]);
    }
    // Weighted random selection (pick 3)
    var claimed = 0;
    var seen = {};
    for (var pick = 0; pick < 3 && weighted.length > 0; pick++) {
      var totalW = 0;
      for (var i = 0; i < weighted.length; i++) totalW += weighted[i][2];
      var r = Math.random() * totalW;
      var cumul = 0;
      for (var i = 0; i < weighted.length; i++) {
        cumul += weighted[i][2];
        if (cumul >= r) {
          var cx = weighted[i][0], cy = weighted[i][1];
          if (grid[idx(cx, cy)] === 0) {
            grid[idx(cx, cy)] = fid;
            claimed++;
          }
          weighted.splice(i, 1);
          break;
        }
      }
    }
  }

  var strategies = [greedyMove, spiralMove, hunterMove, randomMove];

  // Territory capture: cells with 3+ enemy neighbors get flipped
  function territoryCapture() {
    var flips = [];
    for (var y = 0; y < GRID_H; y++) {
      for (var x = 0; x < GRID_W; x++) {
        var owner = grid[idx(x, y)];
        if (owner === 0) continue;
        var nb = getNeighbors4(x, y);
        // Count neighbors by faction
        var counts = [0, 0, 0, 0];
        for (var n = 0; n < nb.length; n++) {
          var nOwner = grid[idx(nb[n][0], nb[n][1])];
          if (nOwner > 0 && nOwner !== owner) {
            counts[nOwner - 1]++;
          }
        }
        // If 3+ neighbors belong to same enemy faction, flip
        for (var f = 0; f < 4; f++) {
          if (counts[f] >= 3) {
            flips.push([x, y, f + 1]);
            break;
          }
        }
      }
    }
    // Apply flips
    for (var i = 0; i < flips.length; i++) {
      grid[idx(flips[i][0], flips[i][1])] = flips[i][2];
    }
  }

  function updateScores() {
    var counts = [0, 0, 0, 0];
    var total = GRID_W * GRID_H;
    for (var i = 0; i < grid.length; i++) {
      if (grid[i] > 0) counts[grid[i] - 1]++;
    }
    var empty = total;
    for (var f = 0; f < 4; f++) {
      factions[f].pct = Math.round(counts[f] / total * 100);
      empty -= counts[f];
    }
    return empty;
  }

  function drawGrid() {
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (var y = 0; y < GRID_H; y++) {
      for (var x = 0; x < GRID_W; x++) {
        var owner = grid[idx(x, y)];
        if (owner > 0) {
          ctx.fillStyle = factions[owner - 1].color;
          ctx.fillRect(x * CELL_PX, y * CELL_PX, CELL_PX, CELL_PX);
        }
      }
    }

    // Territory borders
    ctx.fillStyle = BORDER_COLOR;
    for (var y = 0; y < GRID_H; y++) {
      for (var x = 0; x < GRID_W; x++) {
        var owner = grid[idx(x, y)];
        if (owner === 0) continue;
        if (x < GRID_W - 1) {
          var right = grid[idx(x + 1, y)];
          if (right > 0 && right !== owner) {
            ctx.fillRect((x + 1) * CELL_PX - 1, y * CELL_PX, 2, CELL_PX);
          }
        }
        if (y < GRID_H - 1) {
          var below = grid[idx(x, y + 1)];
          if (below > 0 && below !== owner) {
            ctx.fillRect(x * CELL_PX, (y + 1) * CELL_PX - 1, CELL_PX, 2);
          }
        }
        if (x > 0 && grid[idx(x-1, y)] === 0) ctx.fillRect(x * CELL_PX, y * CELL_PX, 1, CELL_PX);
        if (x < GRID_W-1 && grid[idx(x+1, y)] === 0) ctx.fillRect((x+1) * CELL_PX - 1, y * CELL_PX, 1, CELL_PX);
        if (y > 0 && grid[idx(x, y-1)] === 0) ctx.fillRect(x * CELL_PX, y * CELL_PX, CELL_PX, 1);
        if (y < GRID_H-1 && grid[idx(x, y+1)] === 0) ctx.fillRect(x * CELL_PX, (y+1) * CELL_PX - 1, CELL_PX, 1);
      }
    }
  }

  function updateLegend() {
    var html = '';
    for (var i = 0; i < factions.length; i++) {
      var f = factions[i];
      html += '<div class="legend-item">' +
        '<div class="legend-swatch" style="background:' + f.color + '"></div>' +
        '<div><span class="legend-name">' + f.name + '</span><br>' +
        '<span class="legend-desc">' + f.desc + '</span></div>' +
        '<span class="legend-pct" style="color:' + f.darkColor + '">' + f.pct + '%</span>' +
        '</div>';
    }
    document.getElementById('legend').innerHTML = html;
  }

  function gameTick() {
    if (done) return;
    var order = [0, 1, 2, 3];
    for (var i = 3; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = order[i]; order[i] = order[j]; order[j] = tmp;
    }
    for (var t = 0; t < order.length; t++) {
      strategies[order[t]](order[t] + 1);
    }
    // Territory capture phase — cells surrounded by enemies flip
    territoryCapture();
    tick++;
    var empty = updateScores();
    if (empty === 0) {
      done = true;
      var maxPct = 0, winner = '';
      for (var i = 0; i < factions.length; i++) {
        if (factions[i].pct > maxPct) { maxPct = factions[i].pct; winner = factions[i].name; }
      }
      document.getElementById('status').textContent = winner + ' wins with ' + maxPct + '% — ' + tick + ' ticks';
    } else {
      document.getElementById('status').textContent = 'Tick ' + tick + ' — ' + empty + ' cells remaining';
    }
  }

  var frameCount = 0;
  function frame() {
    frameCount++;
    if (!paused && !done && frameCount % 3 === 0) {
      for (var s = 0; s < speed; s++) {
        gameTick();
        if (done) break;
      }
    }
    drawGrid();
    updateLegend();
    requestAnimationFrame(frame);
  }

  document.getElementById('btnReset').addEventListener('click', function() {
    initGrid();
    done = false;
  });
  document.getElementById('btnPause').addEventListener('click', function() {
    paused = !paused;
    document.getElementById('btnPause').textContent = paused ? 'Play' : 'Pause';
  });
  document.getElementById('btnSpeed').addEventListener('click', function() {
    speedIdx = (speedIdx + 1) % speeds.length;
    speed = speeds[speedIdx];
    document.getElementById('btnSpeed').textContent = 'Speed: ' + speed + 'x';
  });

  initGrid();
  updateScores();
  frame();
})();
</script>
<script>
// Prevent double-tap zoom on iOS
document.addEventListener('touchend', function(e) {
  e.preventDefault();
  e.target.click();
}, {passive: false});
</script>
</body>
</html>
